services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3001:3001'
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - apps/web/.env
    environment:
      NODE_ENV: production
    depends_on:
      - api
